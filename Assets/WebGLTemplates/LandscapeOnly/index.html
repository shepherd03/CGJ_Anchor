<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unity WebGL Player | {{{ PRODUCT_NAME }}}</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        background: #121214;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      #unity-container {
        position: fixed;
        left: 50%;
        top: 50%;
        width: min(100vw, calc(100vh * 960 / 600));
        height: min(100vh, calc(100vw * 600 / 960));
        overflow: hidden;
        background: #231f20;
        transform: translate(-50%, -50%);
      }

      #unity-container.unity-desktop {
        width: {{{ WIDTH }}}px;
        height: {{{ HEIGHT }}}px;
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: {{{ BACKGROUND_COLOR }}};
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        width: min(320px, 72vw);
        transform: translate(-50%, -50%);
        display: none;
      }

      #unity-progress-bar-empty {
        width: 100%;
        height: 12px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.24);
      }

      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: #f6c64a;
      }

      #unity-footer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: -46px;
        height: 38px;
        color: #fff;
      }

      .unity-mobile #unity-footer {
        display: none;
      }

      #unity-fullscreen-button,
      #landscape-button {
        cursor: pointer;
        border: 0;
        color: #161616;
        background: #f6c64a;
      }

      #unity-fullscreen-button {
        float: right;
        width: 112px;
        height: 38px;
      }

      #unity-fullscreen-button::before {
        content: "Fullscreen";
      }

      #unity-build-title {
        float: left;
        line-height: 38px;
        font-size: 18px;
      }

      #unity-warning {
        position: absolute;
        left: 50%;
        top: 5%;
        z-index: 30;
        transform: translateX(-50%);
        background: white;
        display: none;
      }

      #orientation-overlay {
        position: fixed;
        left: 50%;
        top: 16px;
        z-index: 20;
        display: none;
        width: min(420px, calc(100vw - 32px));
        padding: 12px 14px;
        box-sizing: border-box;
        text-align: center;
        color: #fff;
        background: rgba(18, 18, 20, 0.78);
        transform: translateX(-50%);
      }

      #orientation-overlay strong {
        display: block;
        margin-bottom: 4px;
        font-size: 16px;
      }

      #orientation-overlay span {
        display: block;
        max-width: 100%;
        line-height: 1.5;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.78);
      }

      #landscape-button {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 25;
        display: none;
        min-width: 120px;
        min-height: 44px;
        padding: 0 16px;
        font-size: 16px;
      }

      @media (orientation: portrait) and (hover: none) {
        #orientation-overlay {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}} tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-build-title">{{{ PRODUCT_NAME }}}</div>
        <button id="unity-fullscreen-button" type="button" aria-label="Fullscreen"></button>
      </div>
    </div>
    <div id="orientation-overlay">
      <div>
        <strong>请横屏游玩</strong>
        <span>浏览器不能像原生 App 一样直接改系统方向，请旋转设备；点击下方按钮会尝试进入全屏并锁定横屏。</span>
      </div>
    </div>
    <button id="landscape-button" type="button">横屏全屏</button>
    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var landscapeButton = document.querySelector("#landscape-button");
      var warningBanner = document.querySelector("#unity-warning");
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        div.style.padding = "10px";
        if (type == "error") div.style.background = "red";
        if (type == "warning") div.style.background = "yellow";
        warningBanner.appendChild(div);
        if (type != "error") {
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      function getFullscreenElement() {
        return document.fullscreenElement || document.webkitFullscreenElement;
      }

      function requestBrowserFullscreen() {
        var target = container;
        if (target.requestFullscreen) return target.requestFullscreen();
        if (target.webkitRequestFullscreen) {
          target.webkitRequestFullscreen();
        }
        return Promise.resolve();
      }

      async function tryLockLandscape() {
        try {
          if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock("landscape");
          }
        } catch (e) {
        }
      }

      async function enterLandscapeMode() {
        if (!isMobile) return;
        try {
          if (!getFullscreenElement()) {
            await requestBrowserFullscreen();
          }
        } catch (e) {
        }
        await tryLockLandscape();
        updateOrientationUi();
      }

      function updateOrientationUi() {
        landscapeButton.style.display = isMobile && window.innerHeight > window.innerWidth ? "block" : "none";
        if (isMobile) {
          container.style.width = "min(100vw, calc(100vh * 960 / 600))";
          container.style.height = "min(100vh, calc(100vw * 600 / 960))";
        }
      }

      window.addEventListener("resize", updateOrientationUi);
      window.addEventListener("orientationchange", function() {
        setTimeout(updateOrientationUi, 200);
      });
      document.addEventListener("fullscreenchange", tryLockLandscape);
      document.addEventListener("webkitfullscreenchange", tryLockLandscape);
      landscapeButton.addEventListener("click", enterLandscapeMode);

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_THREADS
        workerUrl: buildUrl + "/{{{ WORKER_FILENAME }}}",
#endif
#if USE_WASM
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if MEMORY_FILENAME
        memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        showBanner: unityShowBanner,
      };

      if (isMobile) {
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "{{{ WIDTH }}}px";
        canvas.style.height = "{{{ HEIGHT }}}px";
      }

#if BACKGROUND_FILENAME
      canvas.style.background = "url('" + buildUrl + "/{{{ BACKGROUND_FILENAME.replace(/'/g, '%27') }}}') center / cover";
#endif
      loadingBar.style.display = "block";
      updateOrientationUi();

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
            enterLandscapeMode();
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);

    </script>
  </body>
</html>
